---
openwrt_system:
  hostname: "{{ inventory_hostname }}"
  timezone: MSK-3
  zonename: Europe/Moscow
  ttylogin: 1

openwrt_dropbear:
  PasswordAuth: 0
  RootPasswordAuth: 0
  authorized_keys: []

openwrt_lte: {}
openwrt_lan: {}
openwrt_wlan: {}
openwrt_routes: []
openwrt_dhcp: {}
openwrt_dhcp_leases: []
openwrt_dnsmasq: {}
openwrt_wireguard: []

openwrt_wireguard_packages:
  - wireguard-tools
  - luci-proto-wireguard
  - qrencode

openwrt_podkop_version: 0.7.14
openwrt_podkop_packages:
  - podkop
  - luci-app-podkop
  - luci-i18n-podkop-ru

openwrt_node_exporter_packages:
  - prometheus-node-exporter-lua
  - prometheus-node-exporter-lua-netstat
  - prometheus-node-exporter-lua-openwrt
  - prometheus-node-exporter-lua-uci_dhcp_host
  - prometheus-node-exporter-lua-wifi
  - prometheus-node-exporter-lua-wifi_stations

openwrt_nginx_config_path: /docker/nginx
openwrt_nginx_image: nginxinc/nginx-unprivileged:alpine

openwrt_podkop_proxy_string: vless://{{ (inventory__sing_box_config.users | selectattr('name', 'equalto', inventory_hostname))[0].uuid }}@{{ inventory__sing_box_config.server }}:{{ inventory__sing_box_config.listen_port }}?security=reality&sni={{ inventory__sing_box_config.server_name }}&alpn=h2&fp=chrome&pbk={{ inventory__sing_box_config.public_key }}&sid={{ inventory__sing_box_config.short_id }}&type=tcp&flow={{ (inventory__sing_box_config.users | selectattr('name', 'equalto', inventory_hostname))[0].flow }}
openwrt_podkop_community_lists:
  - russia_inside
openwrt_podkop_user_domains:
  - rwth-aachen.de  # jenkins mirror
  - johnvansickle.com  # ffmpeg static build
  - ansible.com
  - keybase.io
  - thenewstack.io
